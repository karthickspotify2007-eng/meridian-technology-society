<div id="page-loader"><div class="loader-mark" aria-hidden="true"></div></div>
<div data-partial="header"></div>

<main id="main-content">
  <section class="page-banner">
    <div class="container-m">
      <nav class="breadcrumb-m" aria-label="Breadcrumb">
        <a href="/index.html">Home</a><span class="sep">/</span><span aria-current="page">Conferences</span>
      </nav>
      <h1>Conferences</h1>
      <p class="lead">Flagship symposia and focused workshops across every Meridian technical community, in-person, hybrid, and virtual.</p>
    </div>
  </section>

  <section class="section">
    <div class="container-m">
      <div class="listing-chips" id="conference-status-chips">
        <button type="button" class="chip-m is-active" data-value="all">All</button>
        <button type="button" class="chip-m" data-value="upcoming">Upcoming</button>
        <button type="button" class="chip-m" data-value="past">Past</button>
      </div>
      <div class="listing-toolbar">
        <div class="listing-search">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="text" id="conferences-search" placeholder="Search conferences, cities, or codes...">
        </div>
        <div class="listing-selects">
          <select id="filter-topic" aria-label="Filter by topic"><option value="all">All topics</option></select>
          <select id="conferences-sort" aria-label="Sort conferences">
            <option value="soonest">Date: soonest first</option>
            <option value="latest">Date: latest first</option>
          </select>
        </div>
      </div>
      <p class="listing-results-count" id="conferences-count"></p>
      <div class="grid-3" id="conferences-grid"></div>
      <div class="pagination-m" id="conferences-pagination"></div>
    </div>
  </section>
</main>
