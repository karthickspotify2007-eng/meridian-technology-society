<div id="page-loader"><div class="loader-mark" aria-hidden="true"></div></div>
<div data-partial="header"></div>

<main id="main-content">
  <section class="page-banner">
    <div class="container-m">
      <nav class="breadcrumb-m" aria-label="Breadcrumb">
        <a href="/index.html">Home</a><span class="sep">/</span><span aria-current="page">Certifications</span>
      </nav>
      <h1>Certifications</h1>
      <p class="lead">Vendor-neutral, practitioner-built certifications that test judgment under ambiguity, not just recall.</p>
    </div>
  </section>

  <section class="section">
    <div class="container-m">
      <div class="listing-toolbar">
        <div class="listing-search">
          <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
          <input type="text" id="certifications-search" placeholder="Search certifications...">
        </div>
        <div class="listing-selects">
          <select id="filter-domain" aria-label="Filter by domain"><option value="all">All domains</option></select>
        </div>
      </div>
      <p class="listing-results-count" id="certifications-count"></p>
      <div class="grid-3" id="certifications-grid"></div>
      <div class="pagination-m" id="certifications-pagination"></div>
    </div>
  </section>

  <section class="section" id="verify" style="background:var(--m-bg-alt);">
    <div class="container-m">
      <div class="card-m verify-card" data-aos="fade-up">
        <span class="card-m-icon" style="align-self:center;"><i class="fa-solid fa-magnifying-glass-plus" aria-hidden="true"></i></span>
        <h2 style="margin-top:0.6rem;">Verify a certificate</h2>
        <p class="card-m-desc">Enter a credential ID to confirm it was issued by Meridian and is currently valid.</p>
        <form id="verify-cert-form" novalidate>
          <div class="form-m-group">
            <label for="verify-cert-input" class="visually-hidden-focusable">Credential ID</label>
            <input type="text" id="verify-cert-input" placeholder="e.g. MCP-AIS-2026-00142" required>
          </div>
          <button type="submit" class="btn-m btn-m-primary">Verify credential</button>
        </form>
        <div class="verify-result" id="verify-cert-result" hidden></div>
      </div>
    </div>
  </section>
</main>
