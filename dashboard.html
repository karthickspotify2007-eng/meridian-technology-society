<div id="page-loader"><div class="loader-mark" aria-hidden="true"></div></div>

    <div class="app-section" data-section="certificates" id="certificates-section"></div>
    <div class="app-section" data-section="events" id="events-section"></div>
    <div class="app-section" data-section="saved" id="saved-section"></div>
    <div class="app-section" data-section="notifications" id="notifications-section"></div>
    <div class="app-section" data-section="settings" id="settings-section"></div>

<script>

    var toggle = document.getElementById('dashboard-sidebar-toggle');
    var sidebar = document.getElementById('dashboard-sidebar');
    if (toggle && sidebar) toggle.addEventListener('click', function () { sidebar.classList.toggle('is-open'); });
  });
